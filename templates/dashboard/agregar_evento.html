{% extends 'dashboard/base_dashboard.html' %}

{% block titulo %}Agregar evento{% endblock %}

{% block contenido %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'dashboard:eventos' %}"
        style="color: var(--color-gray); text-decoration: none;">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 style="font-family: var(--font-title); font-weight: 700; margin: 0;">
        Agregar evento
    </h4>
</div>

<div class="stat-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-12">
                <label class="form-label">Título</label>
                <input type="text" name="titulo" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Fecha y hora</label>
                <input type="datetime-local" name="fecha" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Capacidad</label>
                <input type="number" name="capacidad" class="form-control"
                        min="1" required>
            </div>
            <div class="col-md-12">
                <label class="form-label">Lugar</label>
                <input type="text" name="lugar" class="form-control" required>
            </div>
            <div class="col-md-12">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="4" required></textarea>
            </div>
            <div class="col-md-12">
                <label class="form-label">Imagen</label>
                <input type="file" name="imagen" class="form-control" accept="image/*">
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-2"></i>Guardar evento
            </button>
            <a href="{% url 'dashboard:eventos' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
