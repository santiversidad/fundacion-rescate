{% extends 'dashboard/base_dashboard.html' %}

{% block titulo %}Agregar miembro{% endblock %}

{% block contenido %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'dashboard:equipo' %}"
        style="color: var(--color-gray); text-decoration: none;">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 style="font-family: var(--font-title); font-weight: 700; margin: 0;">
        Agregar miembro
    </h4>
</div>

<div class="stat-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nombre completo</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Cargo</label>
                <input type="text" name="cargo" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Orden</label>
                <input type="number" name="orden" class="form-control"
                        min="0" value="0">
            </div>
            <div class="col-md-12">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3"></textarea>
            </div>
            <div class="col-md-12">
                <label class="form-label">Foto</label>
                <input type="file" name="foto" class="form-control" accept="image/*">
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-2"></i>Guardar miembro
            </button>
            <a href="{% url 'dashboard:equipo' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
