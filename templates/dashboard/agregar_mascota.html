{% extends 'dashboard/base_dashboard.html' %}

{% block titulo %}Agregar mascota{% endblock %}

{% block contenido %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'dashboard:mascotas' %}"
        style="color: var(--color-gray); text-decoration: none;">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 style="font-family: var(--font-title); font-weight: 700; margin: 0;">
        Agregar mascota
    </h4>
</div>

<div class="stat-card">
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nombre</label>
                <input type="text" name="nombre" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Especie</label>
                <select name="especie" class="form-select" required>
                    <option value="">Selecciona</option>
                    <option value="perro">Perro</option>
                    <option value="gato">Gato</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label">Raza</label>
                <input type="text" name="raza" class="form-control"
                        placeholder="Dejar vacío si es mestizo">
            </div>
            <div class="col-md-3">
                <label class="form-label">Edad (años)</label>
                <input type="number" name="edad_anios" class="form-control"
                        min="0" max="30" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Sexo</label>
                <select name="sexo" class="form-select" required>
                    <option value="">Selecciona</option>
                    <option value="macho">Macho</option>
                    <option value="hembra">Hembra</option>
                </select>
            </div>
            <div class="col-md-12">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="4"></textarea>
            </div>
            <div class="col-md-4">
                <label class="form-label">Fecha de ingreso</label>
                <input type="date" name="fecha_ingreso" class="form-control" required>
            </div>
            <div class="col-md-4 d-flex align-items-end gap-4 pb-2">
                <div class="form-check">
                    <input type="checkbox" name="esterilizado"
                            class="form-check-input" id="esterilizado">
                    <label class="form-check-label" for="esterilizado">
                        Esterilizado
                    </label>
                </div>
                <div class="form-check">
                    <input type="checkbox" name="vacunado"
                            class="form-check-input" id="vacunado">
                    <label class="form-check-label" for="vacunado">
                        Vacunado
                    </label>
                </div>
            </div>
            <div class="col-md-12">
                <label class="form-label">Fotos</label>
                <input type="file" name="fotos" class="form-control"
                        multiple accept="image/*">
                <div class="form-text">Puedes seleccionar varias fotos a la vez.</div>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-2"></i>Guardar mascota
            </button>
            <a href="{% url 'dashboard:mascotas' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
