{% extends 'dashboard/base_dashboard.html' %}

{% block titulo %}Agregar pregunta{% endblock %}

{% block contenido %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'dashboard:faq' %}"
        style="color: var(--color-gray); text-decoration: none;">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 style="font-family: var(--font-title); font-weight: 700; margin: 0;">
        Agregar pregunta frecuente
    </h4>
</div>

<div class="stat-card">
    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-10">
                <label class="form-label">Pregunta</label>
                <input type="text" name="pregunta" class="form-control" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Orden</label>
                <input type="number" name="orden" class="form-control"
                        min="0" value="0">
            </div>
            <div class="col-md-12">
                <label class="form-label">Respuesta</label>
                <textarea name="respuesta" class="form-control" rows="5" required></textarea>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-2"></i>Guardar pregunta
            </button>
            <a href="{% url 'dashboard:faq' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
