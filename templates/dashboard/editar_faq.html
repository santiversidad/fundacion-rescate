{% extends 'dashboard/base_dashboard.html' %}

{% block titulo %}Editar pregunta{% endblock %}

{% block contenido %}

<div class="d-flex align-items-center gap-3 mb-4">
    <a href="{% url 'dashboard:faq' %}"
        style="color: var(--color-gray); text-decoration: none;">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 style="font-family: var(--font-title); font-weight: 700; margin: 0;">
        Editar pregunta
    </h4>
</div>

<div class="stat-card">
    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">
            <div class="col-md-10">
                <label class="form-label">Pregunta</label>
                <input type="text" name="pregunta" class="form-control"
                        value="{{ pregunta.pregunta }}" required>
            </div>
            <div class="col-md-2">
                <label class="form-label">Orden</label>
                <input type="number" name="orden" class="form-control"
                        value="{{ pregunta.orden }}" min="0">
            </div>
            <div class="col-md-12">
                <label class="form-label">Respuesta</label>
                <textarea name="respuesta" class="form-control"
                            rows="5">{{ pregunta.respuesta }}</textarea>
            </div>
            <div class="col-md-12">
                <div class="form-check">
                    <input type="checkbox" name="activa"
                            class="form-check-input" id="activa"
                            {% if pregunta.activa %}checked{% endif %}>
                    <label class="form-check-label" for="activa">
                        Pregunta activa
                    </label>
                </div>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-check-lg me-2"></i>Guardar cambios
            </button>
            <a href="{% url 'dashboard:faq' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </div>

    </form>
</div>

{% endblock %}
