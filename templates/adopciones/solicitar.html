{% extends 'base.html' %}

{% block titulo %}Adoptar a {{ mascota.nombre }}{% endblock %}

{% block contenido %}
<div class="container my-4">
<div class="row justify-content-center">
    <div class="col-md-7">

        <h2 class="mb-1">🐾 Solicitud de adopción</h2>
        <p class="text-muted mb-4">Estás solicitando adoptar a <strong>{{ mascota.nombre }}</strong></p>

        <div class="card shadow">
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">¿Por qué quieres adoptar a {{ mascota.nombre }}?</label>
                        <textarea name="motivo" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Tipo de vivienda</label>
                        <select name="tipo_vivienda" class="form-select" required>
                            <option value="">Selecciona una opción</option>
                            <option value="casa">Casa</option>
                            <option value="apartamento">Apartamento</option>
                            <option value="finca">Finca</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" name="tiene_otros_animales"
                                class="form-check-input" id="otrosAnimales">
                        <label class="form-check-label" for="otrosAnimales">
                            ¿Tienes otros animales en casa?
                        </label>
                    </div>

                    <button type="submit" class="btn btn-success w-100 mt-2">
                        Enviar solicitud
                    </button>
                </form>
            </div>
        </div>

        <div class="mt-3">
            <a href="{% url 'mascotas:detalle' mascota.pk %}" class="btn btn-outline-secondary">
                ← Volver
            </a>
        </div>

    </div>
</div>
</div>
{% endblock %}
