<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del servidor — Fundación Rescate Animal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .error-card {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 500px;
        }
        .error-icon {
            font-size: 5rem;
            color: #dc3545;
            margin-bottom: 1rem;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #5C8A3C;
            line-height: 1;
        }
        .btn-home {
            background-color: #5C8A3C;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-top: 1.5rem;
            transition: background-color 0.2s;
        }
        .btn-home:hover {
            background-color: #4a7030;
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-exclamation-triangle-fill"></i></div>
        <div class="error-code">500</div>
        <h2 class="mt-3 mb-2">Error interno del servidor</h2>
        <p class="text-muted">
            Algo salió mal en nuestro servidor. Nuestro equipo ya fue notificado.<br>
            Por favor intenta de nuevo en unos minutos.
        </p>
        <a href="/" class="btn-home">
            <i class="bi bi-house-fill me-2"></i>Volver al inicio
        </a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
